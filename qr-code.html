<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Code Generator</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f7fb;
      color: #111827;
      padding: 24px;
    }
    .app {
      width: min(1040px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(320px, 1fr) minmax(300px, 420px);
      gap: 20px;
      align-items: start;
    }
    .card {
      background: #ffffff;
      border: 1px solid #dbe3ef;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 12px 32px rgba(15, 23, 42, 0.08);
    }
    h1 { margin: 0 0 8px; font-size: 24px; }
    .lead { margin: 0 0 18px; color: #64748b; line-height: 1.6; font-size: 14px; }
    label { display: block; margin: 14px 0 6px; font-weight: 700; font-size: 14px; }
    textarea, select, input[type="number"], input[type="color"] {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      padding: 10px 12px;
      font: inherit;
      background: #fff;
    }
    textarea { min-height: 170px; resize: vertical; line-height: 1.5; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    button {
      border: 0;
      border-radius: 12px;
      padding: 12px 16px;
      font-weight: 800;
      cursor: pointer;
      background: #2563eb;
      color: #fff;
      font-size: 15px;
    }
    button.secondary { background: #0f172a; }
    button:disabled { background: #94a3b8; cursor: not-allowed; }
    .qr-wrap {
      display: grid;
      place-items: center;
      min-height: 380px;
      background:
        linear-gradient(45deg, #f8fafc 25%, transparent 25%),
        linear-gradient(-45deg, #f8fafc 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #f8fafc 75%),
        linear-gradient(-45deg, transparent 75%, #f8fafc 75%);
      background-size: 24px 24px;
      background-position: 0 0, 0 12px, 12px -12px, -12px 0;
      border: 1px dashed #cbd5e1;
      border-radius: 16px;
      padding: 16px;
      overflow: auto;
    }
    canvas {
      display: block;
      max-width: 100%;
      height: auto;
      image-rendering: pixelated;
      border-radius: 6px;
    }
    .download-fallback {
      display: none;
      margin-top: 14px;
      padding: 12px;
      border-radius: 12px;
      background: #fff7ed;
      border: 1px solid #fed7aa;
      color: #7c2d12;
      font-size: 13px;
      line-height: 1.55;
    }
    .download-fallback.show { display: block; }
    .download-fallback a {
      display: inline-block;
      margin-top: 8px;
      color: #1d4ed8;
      font-weight: 700;
      word-break: break-all;
    }
    .download-fallback img {
      display: block;
      width: 160px;
      height: 160px;
      margin-top: 10px;
      image-rendering: pixelated;
      border: 1px solid #fed7aa;
      background: white;
    }
    .status {
      margin-top: 14px;
      min-height: 24px;
      font-size: 14px;
      color: #334155;
      line-height: 1.5;
      white-space: pre-wrap;
    }
    .error { color: #dc2626; font-weight: 700; }
    .ok { color: #047857; font-weight: 700; }
    .small { color: #64748b; font-size: 12px; line-height: 1.5; }
    @media (max-width: 820px) { .app { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="app">
    <section class="card">
      <h1>QRコード作成ツール</h1>
      <p class="lead">入力したテキストをQRコードにします。Version 1〜40まで対応し、長文でも読み取りやすいように余白を標準で4セル確保します。</p>

      <label for="text">QRコードにする内容</label>
      <textarea id="text" placeholder="https://example.com\n日本語テキストも入力できます。">https://example.com</textarea>

      <div class="grid2">
        <div>
          <label for="ecc">誤り訂正レベル</label>
          <select id="ecc">
            <option value="L">L：容量優先</option>
            <option value="M" selected>M：標準</option>
            <option value="Q">Q：高め</option>
            <option value="H">H：最高</option>
          </select>
        </div>
        <div>
          <label for="version">バージョン</label>
          <select id="version">
            <option value="0" selected>自動 1〜40</option>
          </select>
        </div>
      </div>

      <div class="grid2">
        <div>
          <label for="size">画像サイズ</label>
          <select id="size">
            <option value="256">256 px</option>
            <option value="384" selected>384 px</option>
            <option value="512">512 px</option>
            <option value="768">768 px</option>
            <option value="1024">1024 px</option>
          </select>
        </div>
        <div>
          <label for="margin">余白セル数</label>
          <input id="margin" type="number" min="4" max="16" value="4" />
        </div>
      </div>

      <div class="grid2">
        <div>
          <label for="dark">QR色</label>
          <input id="dark" type="color" value="#000000" />
        </div>
        <div>
          <label for="light">背景色</label>
          <input id="light" type="color" value="#ffffff" />
        </div>
      </div>

      <div class="row" style="margin-top:18px">
        <button id="make">QRコードを作成</button>
        <button id="download" class="secondary" disabled>PNG保存</button>
      </div>
      <p class="small">読み取り優先のため、背景は白・QR色は黒を推奨します。余白は4セル以上必要です。</p>
      <div id="status" class="status"></div>
      <div id="downloadFallback" class="download-fallback" aria-live="polite"></div>
    </section>

    <section class="card">
      <div class="qr-wrap">
        <canvas id="canvas" width="384" height="384" aria-label="QRコード"></canvas>
      </div>
    </section>
  </div>

  <script>
    "use strict";

    // QR Code generator: byte mode, Model 2, versions 1-40, ECC L/M/Q/H.
    // Implemented directly in this file to avoid external libraries/CDN.

    const ECL = { L: 0, M: 1, Q: 2, H: 3 };
    const FORMAT_ECL = [1, 0, 3, 2];

    const ECC_CODEWORDS_PER_BLOCK = [
      [-1,7,10,15,20,26,18,20,24,30,18,20,24,26,30,22,24,28,30,28,28,28,28,30,30,26,28,30,30,30,30,30,30,30,30,30,30,30,30,30,30],
      [-1,10,16,26,18,24,16,18,22,22,26,30,22,22,24,24,28,28,26,26,26,26,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28],
      [-1,13,22,18,26,18,24,18,22,20,24,28,26,24,20,30,24,28,28,26,30,28,30,30,30,30,28,30,30,30,30,30,30,30,30,30,30,30,30,30,30],
      [-1,17,28,22,16,22,28,26,26,24,28,24,28,22,24,24,30,28,28,26,28,30,24,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30]
    ];

    const NUM_ERROR_CORRECTION_BLOCKS = [
      [-1,1,1,1,1,1,2,2,2,2,4,4,4,4,4,6,6,6,6,7,8,8,9,9,10,12,12,12,13,14,15,16,17,18,19,19,20,21,22,24,25],
      [-1,1,1,1,2,2,4,4,4,5,5,5,8,9,9,10,10,11,13,14,16,17,17,18,20,21,23,25,26,28,29,31,33,35,37,38,40,43,45,47,49],
      [-1,1,1,2,2,4,4,6,6,8,8,8,10,12,16,12,17,16,18,21,20,23,23,25,27,29,34,34,35,38,40,43,45,48,51,53,56,59,62,65,68],
      [-1,1,1,2,4,4,4,5,6,8,8,11,11,16,16,18,16,19,21,25,25,25,34,30,32,35,37,40,42,45,48,51,54,57,60,63,66,70,74,77,81]
    ];

    class BitBuffer {
      constructor() { this.bits = []; }
      append(value, length) {
        if (length < 0 || value >>> length !== 0) throw new Error("BitBuffer append error");
        for (let i = length - 1; i >= 0; i--) this.bits.push((value >>> i) & 1);
      }
      get length() { return this.bits.length; }
    }

    function getNumRawDataModules(version) {
      let result = (16 * version + 128) * version + 64;
      if (version >= 2) {
        const numAlign = Math.floor(version / 7) + 2;
        result -= (25 * numAlign - 10) * numAlign - 55;
        if (version >= 7) result -= 36;
      }
      return result;
    }

    function getNumDataCodewords(version, ecl) {
      return Math.floor(getNumRawDataModules(version) / 8) -
        ECC_CODEWORDS_PER_BLOCK[ecl][version] * NUM_ERROR_CORRECTION_BLOCKS[ecl][version];
    }

    function encodeTextToQr(text, eclName, requestedVersion) {
      const ecl = ECL[eclName];
      const data = Array.from(new TextEncoder().encode(text));
      if (data.length === 0) throw new Error("テキストを入力してください。");

      let version = requestedVersion;
      if (version === 0) {
        for (let v = 1; v <= 40; v++) {
          if (fitsInVersion(data.length, v, ecl)) { version = v; break; }
        }
        if (version === 0) throw new Error("入力内容が長すぎます。誤り訂正レベルを下げるか、文字数を減らしてください。");
      } else if (!fitsInVersion(data.length, version, ecl)) {
        throw new Error(`Version ${version} には入りません。自動選択にするか、より大きいバージョンを選んでください。`);
      }

      const bitBuf = makeDataBits(data, version, ecl);
      const dataCodewords = bitsToCodewords(bitBuf.bits);
      const allCodewords = addEccAndInterleave(dataCodewords, version, ecl);
      return new QrCode(version, ecl, allCodewords);
    }

    function fitsInVersion(byteLength, version, ecl) {
      const dataCapacityBits = getNumDataCodewords(version, ecl) * 8;
      const countBits = version <= 9 ? 8 : 16;
      return 4 + countBits + byteLength * 8 <= dataCapacityBits;
    }

    function makeDataBits(bytes, version, ecl) {
      const capacityBits = getNumDataCodewords(version, ecl) * 8;
      const bb = new BitBuffer();
      bb.append(0x4, 4); // Byte mode
      bb.append(bytes.length, version <= 9 ? 8 : 16);
      for (const b of bytes) bb.append(b, 8);

      bb.append(0, Math.min(4, capacityBits - bb.length));
      while (bb.length % 8 !== 0) bb.append(0, 1);

      for (let pad = 0xec; bb.length < capacityBits; pad ^= 0xec ^ 0x11) {
        bb.append(pad, 8);
      }
      return bb;
    }

    function bitsToCodewords(bits) {
      const result = [];
      for (let i = 0; i < bits.length; i += 8) {
        let b = 0;
        for (let j = 0; j < 8; j++) b = (b << 1) | bits[i + j];
        result.push(b);
      }
      return result;
    }

    function addEccAndInterleave(data, version, ecl) {
      const numBlocks = NUM_ERROR_CORRECTION_BLOCKS[ecl][version];
      const blockEccLen = ECC_CODEWORDS_PER_BLOCK[ecl][version];
      const rawCodewords = Math.floor(getNumRawDataModules(version) / 8);
      const numShortBlocks = numBlocks - rawCodewords % numBlocks;
      const shortBlockDataLen = Math.floor(rawCodewords / numBlocks) - blockEccLen;

      const rsDiv = reedSolomonComputeDivisor(blockEccLen);
      const blocks = [];
      let k = 0;
      for (let i = 0; i < numBlocks; i++) {
        const datLen = shortBlockDataLen + (i < numShortBlocks ? 0 : 1);
        const dat = data.slice(k, k + datLen);
        k += datLen;
        const ecc = reedSolomonComputeRemainder(dat, rsDiv);
        blocks.push({ data: dat, ecc });
      }
      if (k !== data.length) throw new Error("内部エラー：データ分割に失敗しました。");

      const result = [];
      const maxDataLen = shortBlockDataLen + 1;
      for (let i = 0; i < maxDataLen; i++) {
        for (const block of blocks) {
          if (i < block.data.length) result.push(block.data[i]);
        }
      }
      for (let i = 0; i < blockEccLen; i++) {
        for (const block of blocks) result.push(block.ecc[i]);
      }
      if (result.length !== rawCodewords) throw new Error("内部エラー：コード語数が一致しません。");
      return result;
    }

    function reedSolomonComputeDivisor(degree) {
      const result = Array(degree).fill(0);
      result[degree - 1] = 1;
      let root = 1;
      for (let i = 0; i < degree; i++) {
        for (let j = 0; j < degree; j++) {
          result[j] = reedSolomonMultiply(result[j], root);
          if (j + 1 < degree) result[j] ^= result[j + 1];
        }
        root = reedSolomonMultiply(root, 0x02);
      }
      return result;
    }

    function reedSolomonComputeRemainder(data, divisor) {
      const result = Array(divisor.length).fill(0);
      for (const b of data) {
        const factor = b ^ result.shift();
        result.push(0);
        for (let i = 0; i < result.length; i++) result[i] ^= reedSolomonMultiply(divisor[i], factor);
      }
      return result;
    }

    function reedSolomonMultiply(x, y) {
      let z = 0;
      for (let i = 7; i >= 0; i--) {
        z = (z << 1) ^ ((z >>> 7) * 0x11d);
        z ^= ((y >>> i) & 1) * x;
      }
      return z;
    }

    class QrCode {
      constructor(version, ecl, codewords) {
        this.version = version;
        this.ecl = ecl;
        this.size = version * 4 + 17;
        this.modules = Array.from({ length: this.size }, () => Array(this.size).fill(false));
        this.isFunction = Array.from({ length: this.size }, () => Array(this.size).fill(false));
        this.drawFunctionPatterns();
        this.drawCodewords(codewords);
        let bestMask = 0;
        let minPenalty = Infinity;
        for (let mask = 0; mask < 8; mask++) {
          this.applyMask(mask);
          this.drawFormatBits(mask);
          const penalty = this.getPenaltyScore();
          if (penalty < minPenalty) { minPenalty = penalty; bestMask = mask; }
          this.applyMask(mask);
        }
        this.applyMask(bestMask);
        this.drawFormatBits(bestMask);
        this.mask = bestMask;
      }

      getModule(x, y) { return 0 <= x && x < this.size && 0 <= y && y < this.size && this.modules[y][x]; }
      setModule(x, y, dark) { this.modules[y][x] = dark; }
      setFunctionModule(x, y, dark) { this.modules[y][x] = dark; this.isFunction[y][x] = true; }

      drawFunctionPatterns() {
        for (let i = 0; i < this.size; i++) {
          this.setFunctionModule(6, i, i % 2 === 0);
          this.setFunctionModule(i, 6, i % 2 === 0);
        }
        this.drawFinderPattern(3, 3);
        this.drawFinderPattern(this.size - 4, 3);
        this.drawFinderPattern(3, this.size - 4);
        const align = this.getAlignmentPatternPositions();
        for (const y of align) for (const x of align) {
          if (!((x === 6 && y === 6) || (x === 6 && y === this.size - 7) || (x === this.size - 7 && y === 6))) {
            this.drawAlignmentPattern(x, y);
          }
        }
        this.drawFormatBits(0);
        this.drawVersionBits();
      }

      drawFinderPattern(cx, cy) {
        for (let dy = -4; dy <= 4; dy++) {
          for (let dx = -4; dx <= 4; dx++) {
            const x = cx + dx, y = cy + dy;
            if (0 <= x && x < this.size && 0 <= y && y < this.size) {
              const dist = Math.max(Math.abs(dx), Math.abs(dy));
              this.setFunctionModule(x, y, dist !== 2 && dist !== 4);
            }
          }
        }
      }

      drawAlignmentPattern(cx, cy) {
        for (let dy = -2; dy <= 2; dy++) for (let dx = -2; dx <= 2; dx++) {
          this.setFunctionModule(cx + dx, cy + dy, Math.max(Math.abs(dx), Math.abs(dy)) !== 1);
        }
      }

      getAlignmentPatternPositions() {
        if (this.version === 1) return [];
        const numAlign = Math.floor(this.version / 7) + 2;
        const step = this.version === 32 ? 26 : Math.ceil((this.version * 4 + 4) / (numAlign * 2 - 2)) * 2;
        const result = [6];
        for (let pos = this.size - 7; result.length < numAlign; pos -= step) result.splice(1, 0, pos);
        return result;
      }

      drawFormatBits(mask) {
        const data = (FORMAT_ECL[this.ecl] << 3) | mask;
        let rem = data;
        for (let i = 0; i < 10; i++) rem = (rem << 1) ^ (((rem >>> 9) & 1) * 0x537);
        const bits = ((data << 10) | rem) ^ 0x5412;
        for (let i = 0; i <= 5; i++) this.setFunctionModule(8, i, ((bits >>> i) & 1) !== 0);
        this.setFunctionModule(8, 7, ((bits >>> 6) & 1) !== 0);
        this.setFunctionModule(8, 8, ((bits >>> 7) & 1) !== 0);
        this.setFunctionModule(7, 8, ((bits >>> 8) & 1) !== 0);
        for (let i = 9; i < 15; i++) this.setFunctionModule(14 - i, 8, ((bits >>> i) & 1) !== 0);
        for (let i = 0; i < 8; i++) this.setFunctionModule(this.size - 1 - i, 8, ((bits >>> i) & 1) !== 0);
        for (let i = 8; i < 15; i++) this.setFunctionModule(8, this.size - 15 + i, ((bits >>> i) & 1) !== 0);
        this.setFunctionModule(8, this.size - 8, true);
      }

      drawVersionBits() {
        if (this.version < 7) return;
        let rem = this.version;
        for (let i = 0; i < 12; i++) rem = (rem << 1) ^ (((rem >>> 11) & 1) * 0x1f25);
        const bits = (this.version << 12) | rem;
        for (let i = 0; i < 18; i++) {
          const bit = ((bits >>> i) & 1) !== 0;
          this.setFunctionModule(this.size - 11 + (i % 3), Math.floor(i / 3), bit);
          this.setFunctionModule(Math.floor(i / 3), this.size - 11 + (i % 3), bit);
        }
      }

      drawCodewords(data) {
        let bitIndex = 0;
        const totalBits = data.length * 8;
        for (let right = this.size - 1; right >= 1; right -= 2) {
          if (right === 6) right = 5;
          for (let vert = 0; vert < this.size; vert++) {
            for (let j = 0; j < 2; j++) {
              const x = right - j;
              const upward = ((right + 1) & 2) === 0;
              const y = upward ? this.size - 1 - vert : vert;
              if (!this.isFunction[y][x] && bitIndex < totalBits) {
                this.modules[y][x] = ((data[Math.floor(bitIndex / 8)] >>> (7 - (bitIndex % 8))) & 1) !== 0;
                bitIndex++;
              }
            }
          }
        }
      }

      applyMask(mask) {
        for (let y = 0; y < this.size; y++) for (let x = 0; x < this.size; x++) {
          if (!this.isFunction[y][x] && maskCondition(mask, x, y)) this.modules[y][x] = !this.modules[y][x];
        }
      }

      getPenaltyScore() {
        let result = 0;
        const n = this.size;
        // Adjacent modules in row/column in same color
        for (let y = 0; y < n; y++) {
          let runColor = this.modules[y][0], runLen = 1;
          for (let x = 1; x < n; x++) {
            if (this.modules[y][x] === runColor) runLen++;
            else { if (runLen >= 5) result += 3 + runLen - 5; runColor = this.modules[y][x]; runLen = 1; }
          }
          if (runLen >= 5) result += 3 + runLen - 5;
        }
        for (let x = 0; x < n; x++) {
          let runColor = this.modules[0][x], runLen = 1;
          for (let y = 1; y < n; y++) {
            if (this.modules[y][x] === runColor) runLen++;
            else { if (runLen >= 5) result += 3 + runLen - 5; runColor = this.modules[y][x]; runLen = 1; }
          }
          if (runLen >= 5) result += 3 + runLen - 5;
        }
        // 2x2 blocks
        for (let y = 0; y < n - 1; y++) for (let x = 0; x < n - 1; x++) {
          const c = this.modules[y][x];
          if (c === this.modules[y][x + 1] && c === this.modules[y + 1][x] && c === this.modules[y + 1][x + 1]) result += 3;
        }
        // Finder-like patterns
        const pattern1 = [true,false,true,true,true,false,true,false,false,false,false];
        const pattern2 = [false,false,false,false,true,false,true,true,true,false,true];
        for (let y = 0; y < n; y++) for (let x = 0; x <= n - 11; x++) {
          let ok1 = true, ok2 = true;
          for (let k = 0; k < 11; k++) { ok1 &&= this.modules[y][x + k] === pattern1[k]; ok2 &&= this.modules[y][x + k] === pattern2[k]; }
          if (ok1 || ok2) result += 40;
        }
        for (let x = 0; x < n; x++) for (let y = 0; y <= n - 11; y++) {
          let ok1 = true, ok2 = true;
          for (let k = 0; k < 11; k++) { ok1 &&= this.modules[y + k][x] === pattern1[k]; ok2 &&= this.modules[y + k][x] === pattern2[k]; }
          if (ok1 || ok2) result += 40;
        }
        // Balance of dark modules
        let dark = 0;
        for (let y = 0; y < n; y++) for (let x = 0; x < n; x++) if (this.modules[y][x]) dark++;
        const k = Math.ceil(Math.abs(dark * 20 - n * n * 10) / (n * n)) - 1;
        result += k * 10;
        return result;
      }
    }

    function maskCondition(mask, x, y) {
      switch (mask) {
        case 0: return (x + y) % 2 === 0;
        case 1: return y % 2 === 0;
        case 2: return x % 3 === 0;
        case 3: return (x + y) % 3 === 0;
        case 4: return (Math.floor(x / 3) + Math.floor(y / 2)) % 2 === 0;
        case 5: return ((x * y) % 2 + (x * y) % 3) === 0;
        case 6: return (((x * y) % 2 + (x * y) % 3) % 2) === 0;
        case 7: return (((x + y) % 2 + (x * y) % 3) % 2) === 0;
        default: throw new Error("Invalid mask");
      }
    }

    function renderQr(qr, canvas, options) {
      const size = Number(options.size);
      const margin = Math.max(4, Number(options.margin));
      const dark = options.dark;
      const light = options.light;
      const modules = qr.size;
      const totalModules = modules + margin * 2;
      const scale = Math.max(1, Math.floor(size / totalModules));
      const actualSize = totalModules * scale;

      canvas.width = actualSize;
      canvas.height = actualSize;
      const ctx = canvas.getContext("2d");
      ctx.imageSmoothingEnabled = false;
      ctx.fillStyle = light;
      ctx.fillRect(0, 0, actualSize, actualSize);
      ctx.fillStyle = dark;
      for (let y = 0; y < modules; y++) {
        for (let x = 0; x < modules; x++) {
          if (qr.getModule(x, y)) ctx.fillRect((x + margin) * scale, (y + margin) * scale, scale, scale);
        }
      }
      return { actualSize, scale };
    }

    const textEl = document.getElementById("text");
    const eccEl = document.getElementById("ecc");
    const versionEl = document.getElementById("version");
    const sizeEl = document.getElementById("size");
    const marginEl = document.getElementById("margin");
    const darkEl = document.getElementById("dark");
    const lightEl = document.getElementById("light");
    const makeBtn = document.getElementById("make");
    const downloadBtn = document.getElementById("download");
    const statusEl = document.getElementById("status");
    const canvas = document.getElementById("canvas");
    const downloadFallbackEl = document.getElementById("downloadFallback");
    let lastQr = null;
    let lastObjectUrl = null;

    for (let i = 1; i <= 40; i++) {
      const opt = document.createElement("option");
      opt.value = String(i);
      opt.textContent = `Version ${i}`;
      versionEl.appendChild(opt);
    }

    function currentOptions() {
      return {
        size: Number(sizeEl.value),
        margin: Number(marginEl.value),
        dark: darkEl.value,
        light: lightEl.value,
      };
    }

    function generate() {
      try {
        const text = textEl.value;
        const ecc = eccEl.value;
        const requestedVersion = Number(versionEl.value);
        const qr = encodeTextToQr(text, ecc, requestedVersion);
        const renderInfo = renderQr(qr, canvas, currentOptions());
        lastQr = qr;
        clearDownloadFallback();
        downloadBtn.disabled = false;
        const bytes = new TextEncoder().encode(text).length;
        statusEl.className = "status ok";
        statusEl.textContent = `作成しました。Version ${qr.version} / ${qr.size}×${qr.size} modules / UTF-8 ${bytes} bytes / Mask ${qr.mask} / 画像 ${renderInfo.actualSize}px`;
      } catch (err) {
        lastQr = null;
        clearDownloadFallback();
        downloadBtn.disabled = true;
        statusEl.className = "status error";
        statusEl.textContent = err.message || String(err);
      }
    }

    function rerenderIfPossible() {
      if (!lastQr) return;
      renderQr(lastQr, canvas, currentOptions());
      clearDownloadFallback();
    }

    function clearDownloadFallback() {
      if (lastObjectUrl) {
        URL.revokeObjectURL(lastObjectUrl);
        lastObjectUrl = null;
      }
      downloadFallbackEl.classList.remove("show");
      downloadFallbackEl.textContent = "";
    }

    function canvasToBlobAsync(targetCanvas) {
      return new Promise((resolve, reject) => {
        if (!targetCanvas.toBlob) {
          try {
            const dataUrl = targetCanvas.toDataURL("image/png");
            const binary = atob(dataUrl.split(",")[1]);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
            resolve(new Blob([bytes], { type: "image/png" }));
          } catch (err) {
            reject(err);
          }
          return;
        }
        targetCanvas.toBlob(blob => {
          if (blob) resolve(blob);
          else reject(new Error("PNG画像を作成できませんでした。"));
        }, "image/png");
      });
    }

    function showDownloadFallback(url) {
      downloadFallbackEl.classList.add("show");
      downloadFallbackEl.innerHTML = `
        iframeの制限で自動保存がブロックされた可能性があります。<br>
        下のリンクまたは画像を右クリック・長押しして保存してください。<br>
        <a href="${url}" download="qr-code.png" target="_blank" rel="noopener">PNG画像を開く / 保存する</a>
        <img src="${url}" alt="保存用QRコード画像">
      `;
    }

    function requestMyShortcutsDownload(blob, filename) {
      const bridge = window.MyShortcuts;
      if (bridge && typeof bridge.downloadBlob === "function") {
        bridge.downloadBlob(blob, filename);
        return true;
      }
      if (window.parent && window.parent !== window) {
        window.parent.postMessage(
          {
            type: "my-shortcuts-html-app-download",
            blob,
            filename
          },
          "*"
        );
        return true;
      }
      return false;
    }

    makeBtn.addEventListener("click", generate);
    [sizeEl, marginEl, darkEl, lightEl].forEach(el => el.addEventListener("input", rerenderIfPossible));
    downloadBtn.addEventListener("click", async () => {
      if (!lastQr) return;

      try {
        clearDownloadFallback();
        const blob = await canvasToBlobAsync(canvas);
        const filename = "qr-code.png";

        if (requestMyShortcutsDownload(blob, filename)) {
          statusEl.className = "status ok";
          statusEl.textContent = "PNG保存を開始しました。保存が始まらない場合は、ブラウザのダウンロード設定や拡張機能の権限を確認してください。";
          return;
        }

        const url = URL.createObjectURL(blob);
        lastObjectUrl = url;

        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        a.target = "_blank";
        a.rel = "noopener";
        document.body.appendChild(a);
        a.click();
        a.remove();

        showDownloadFallback(url);
        statusEl.className = "status ok";
        statusEl.textContent = "PNG保存を実行しました。保存が始まらない場合は、下の保存リンクまたは画像から保存してください。";
      } catch (err) {
        statusEl.className = "status error";
        statusEl.textContent = err.message || String(err);
      }
    });

    generate();
  </script>
</body>
</html>
