<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>寿司タイピング v20</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg0: #fff8e8;
    --bg1: #f3cf90;
    --panel: rgba(255, 253, 246, 0.94);
    --panel2: rgba(255, 248, 229, 0.96);
    --ink: #2f261d;
    --muted: #806a55;
    --accent: #c7352a;
    --accent2: #087f7a;
    --good: #0d8a67;
    --bad: #d33a42;
    --steel: #6f7d79;
    --lacquer: #a92520;
    --wood: #9b6538;
    --paper: #fffaf0;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    margin: 0;
    background:
      repeating-linear-gradient(90deg, rgba(116, 76, 39, .055) 0 1px, transparent 1px 38px),
      repeating-linear-gradient(0deg, rgba(255,255,255,.30) 0 1px, transparent 1px 18px),
      linear-gradient(135deg, #fffaf0 0%, #f4d391 52%, #d99659 100%);
    color: var(--ink);
    font-family: 'Helvetica Neue', Arial, sans-serif;
    user-select: none;
  }

  #app-root {
    width: 1060px;
    height: 700px;
    transform-origin: center center;
    flex-shrink: 0;
    position: relative;
  }

  .game-shell {
    width: 100%;
    height: 100%;
    border: 3px solid rgba(117, 50, 29, .38);
    border-radius: 22px;
    overflow: hidden;
    position: relative;
    background:
      repeating-linear-gradient(90deg, rgba(255,255,255,.18) 0 1px, transparent 1px 34px),
      linear-gradient(180deg, rgba(255,255,255,.76), rgba(255,245,220,.36)),
      linear-gradient(180deg, #fff4d8 0%, #fee4b2 52%, #c78045 100%);
    box-shadow: 0 30px 78px rgba(82, 44, 17, .32), inset 0 1px 0 rgba(255,255,255,.86);
  }
  .game-shell::before {
    content: '';
    position: absolute;
    z-index: 0;
    left: -30px;
    right: -30px;
    top: -18px;
    height: 84px;
    background:
      repeating-linear-gradient(90deg, #c84031 0 88px, #f7efe0 88px 130px),
      linear-gradient(180deg, rgba(255,255,255,.20), rgba(0,0,0,.04));
    box-shadow: 0 10px 20px rgba(120, 42, 20, .14);
    opacity: .18;
    pointer-events: none;
  }
  .game-shell::after {
    content: '';
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 180px;
    background:
      repeating-linear-gradient(8deg, rgba(88, 44, 18, .10) 0 2px, transparent 2px 34px),
      linear-gradient(180deg, rgba(255,255,255,0), rgba(133, 74, 34, .25));
    pointer-events: none;
    z-index: 0;
  }

  .game-shell.shake-small { animation: shakeSmall .18s ease-out; }
  .game-shell.shake-big { animation: shakeBig .32s ease-out; }

  @keyframes shakeSmall {
    0% { transform: translateX(0); }
    30% { transform: translateX(-4px); }
    60% { transform: translateX(4px); }
    100% { transform: translateX(0); }
  }
  @keyframes shakeBig {
    0% { transform: translateX(0); }
    20% { transform: translate(-8px, 2px); }
    45% { transform: translate(7px, -2px); }
    70% { transform: translate(-4px, 1px); }
    100% { transform: translateX(0); }
  }

  header {
    height: 112px;
    padding: 18px 26px 12px;
    display: grid;
    grid-template-columns: 1.2fr 1fr 1fr 1fr 1fr;
    gap: 14px;
    align-items: stretch;
    position: relative;
    z-index: 5;
  }

  .title-card,
  .stat-card {
    background:
      linear-gradient(180deg, rgba(255,255,255,.95), rgba(255,246,224,.92));
    border: 1px solid rgba(178, 92, 43, .22);
    border-radius: 8px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.85), 0 10px 24px rgba(129, 72, 29, .16);
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 0;
  }

  .title-card {
    flex-direction: column;
    gap: 0;
    letter-spacing: 0;
    padding: 6px 10px 7px;
  }
  .title-main {
    font-family: 'Courier New', 'Lucida Console', monospace;
    font-size: 27px;
    line-height: 1.22;
    font-weight: 900;
    color: #9b241b;
    text-shadow: 0 2px 0 rgba(255,255,255,.86), 0 10px 24px rgba(155,36,27,.13);
    white-space: nowrap;
    overflow: visible;
    max-width: 100%;
    padding-top: 2px;
  }

  .stat-card {
    flex-direction: column;
    gap: 6px;
    padding: 7px 10px;
  }
  .stat-label {
    color: var(--muted);
    font-size: 14px;
    line-height: 1;
    font-weight: 700;
    letter-spacing: 0;
  }
  .stat-value {
    font-family: 'Courier New', 'Lucida Console', monospace;
    color: #9b241b;
    font-size: 34px;
    line-height: 1;
    font-weight: 900;
  }
  .stat-value.small { font-size: 30px; }

  .stage {
    position: absolute;
    left: 0;
    right: 0;
    top: 112px;
    bottom: 0;
    overflow: hidden;
    z-index: 1;
    background:
      repeating-linear-gradient(0deg, rgba(118, 76, 38, .045) 0 1px, transparent 1px 22px),
      linear-gradient(180deg, #fff7df 0%, #ffe9bf 54%, #c17a42 100%);
  }

  .decor-wave {
    position: absolute;
    inset: 0;
    opacity: .15;
    background-image:
      radial-gradient(circle at 30px 36px, transparent 0 24px, rgba(174, 74, 54, .20) 25px 27px, transparent 28px),
      radial-gradient(circle at 90px 36px, transparent 0 24px, rgba(174, 74, 54, .14) 25px 27px, transparent 28px),
      radial-gradient(circle at 60px 86px, transparent 0 24px, rgba(174, 74, 54, .12) 25px 27px, transparent 28px);
    background-size: 120px 96px;
    animation: drift 18s linear infinite;
  }
  @keyframes drift { to { background-position: 120px 120px, -120px -120px; } }

  .sushi-shop-decor {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 1;
  }
  .sushi-shop-decor::before {
    content: none;
    display: none;
  }
  .sushi-shop-decor::after {
    content: none;
    display: none;
  }
  .noren {
    position: absolute;
    top: 0;
    left: 12px;
    width: 330px;
    height: 102px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    filter: drop-shadow(0 8px 10px rgba(97,43,21,.13));
    opacity: .88;
    z-index: 2;
  }
  .noren span {
    position: relative;
    margin-right: 6px;
    border-radius: 0 0 14px 14px;
    background:
      linear-gradient(180deg, rgba(255,255,255,.20), transparent 44%),
      linear-gradient(180deg, #b72e27, #8f211b);
    box-shadow: inset 0 -4px 0 rgba(72,19,14,.18);
  }
  .noren span::after {
    content: '';
    position: absolute;
    left: 50%;
    bottom: 19px;
    width: 34px;
    height: 34px;
    transform: translateX(-50%);
    border-radius: 50%;
    background: rgba(255,248,224,.75);
    box-shadow: 0 0 0 5px rgba(255,248,224,.16);
  }
  .wall-menu {
    position: absolute;
    top: 15px;
    right: 24px;
    display: grid;
    grid-template-columns: repeat(2, 94px);
    gap: 7px;
    transform: rotate(1.2deg);
    opacity: .86;
    filter: drop-shadow(0 8px 10px rgba(91,45,20,.10));
    z-index: 2;
  }
  .menu-strip {
    height: 44px;
    border-radius: 4px;
    border: 1px solid rgba(132,58,32,.30);
    background:
      linear-gradient(90deg, #b62c25 0 6px, transparent 7px 100%),
      linear-gradient(180deg, rgba(255,255,255,.78), rgba(255,244,202,.88)),
      linear-gradient(90deg, #fff8dd, #f0c96e);
    box-shadow: 0 8px 15px rgba(94,50,20,.12), inset 0 1px 0 rgba(255,255,255,.78);
    position: relative;
    padding: 7px 9px 6px;
    color: #74431f;
    font-family: 'Meiryo', 'Helvetica Neue', Arial, sans-serif;
    font-weight: 900;
    font-size: 13px;
    line-height: 1;
  }
  .menu-strip::before {
    content: attr(data-neta);
    display: block;
    width: auto;
    height: auto;
    margin: 0 0 7px;
    border-radius: 0;
    background: transparent;
    color: #8f231c;
  }
  .menu-strip::after {
    content: attr(data-price);
    display: block;
    width: auto;
    height: auto;
    margin: 0;
    border-radius: 0;
    background: transparent;
    color: #1f6d5f;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    text-align: right;
  }
  .counter-decor {
    position: absolute;
    left: 18px;
    right: 18px;
    bottom: 16px;
    height: 78px;
    border-radius: 18px 18px 0 0;
    background:
      repeating-linear-gradient(90deg, rgba(118,66,32,.11) 0 2px, transparent 2px 48px),
      linear-gradient(180deg, rgba(196,119,61,.12), rgba(108,58,27,.20));
    opacity: .36;
  }
  .counter-decor::before {
    content: none;
    display: none;
  }
  .soy-saucer {
    position: absolute;
    right: 262px;
    bottom: 84px;
    width: 96px;
    height: 34px;
    border-radius: 50%;
    background:
      radial-gradient(ellipse at 50% 45%, rgba(56,26,14,.70) 0 38%, transparent 39%),
      radial-gradient(ellipse at 50% 48%, #f9fbf4 0 65%, #cbd6d2 66% 73%, transparent 74%);
    box-shadow: 0 12px 18px rgba(83,45,20,.15), 0 23px 16px -12px rgba(82,43,18,.22);
    opacity: .86;
    z-index: 2;
  }
  .soy-saucer::before {
    content: '';
    position: absolute;
    left: 26px;
    top: -7px;
    width: 19px;
    height: 14px;
    border-radius: 48% 52% 54% 46%;
    background:
      radial-gradient(circle at 34% 26%, rgba(255,255,255,.42), transparent 24%),
      linear-gradient(145deg, #bce072, #6ea934);
    box-shadow: 0 4px 5px rgba(70,45,20,.12);
    transform: rotate(-8deg);
  }
  .soy-saucer::after {
    content: '';
    position: absolute;
    right: 19px;
    top: -9px;
    width: 28px;
    height: 17px;
    border-radius: 50%;
    background:
      radial-gradient(ellipse at 26% 42%, #ffd5c5 0 28%, transparent 29%),
      radial-gradient(ellipse at 50% 36%, #ffc0ae 0 35%, transparent 36%),
      radial-gradient(ellipse at 70% 50%, #f6a193 0 33%, transparent 34%);
    box-shadow: 0 4px 6px rgba(70,45,20,.11);
    transform: rotate(9deg);
  }
  .teacup {
    position: absolute;
    right: 24px;
    bottom: 54px;
    width: 82px;
    height: 88px;
    border-radius: 15px 15px 21px 21px / 10px 10px 18px 18px;
    background:
      radial-gradient(ellipse at 68% 22%, rgba(255,255,255,.28), transparent 22%),
      radial-gradient(ellipse at 22% 62%, rgba(255,255,255,.18), transparent 28%),
      repeating-linear-gradient(0deg, transparent 0 14px, rgba(28,57,68,.14) 14px 16px),
      linear-gradient(90deg, rgba(255,255,255,.22), transparent 26%, transparent 72%, rgba(0,0,0,.18)),
      linear-gradient(180deg, #7ea8b2 0%, #4e8494 46%, #315f72 100%);
    box-shadow:
      0 14px 22px rgba(61,36,16,.18),
      0 27px 18px -13px rgba(82,43,18,.28),
      inset 0 4px 0 rgba(255,255,255,.20),
      inset 0 -8px 0 rgba(31,67,78,.20);
    opacity: .92;
    z-index: 2;
  }
  .teacup::before {
    content: '';
    position: absolute;
    left: 16px;
    right: 16px;
    top: 24px;
    bottom: 14px;
    border-radius: 16px;
    background:
      linear-gradient(90deg, rgba(244,250,238,.70) 0 6px, transparent 7px 100%),
      linear-gradient(90deg, transparent 0 70%, rgba(244,250,238,.28) 71% 79%, transparent 80% 100%);
    opacity: .88;
  }
  .teacup::after {
    content: '';
    position: absolute;
    left: 11px;
    right: 11px;
    top: -2px;
    height: 21px;
    border-radius: 50%;
    background:
      radial-gradient(ellipse at 50% 50%, #78984c 0 56%, #dce9e4 57% 61%, #5b8998 62% 68%, #2d6377 69% 75%, transparent 76%);
    box-shadow:
      inset 0 3px 0 rgba(255,255,255,.26),
      0 3px 3px rgba(35,54,58,.20),
      0 78px 0 -18px #c7a86f;
  }
  .chopsticks {
    position: absolute;
    right: 120px;
    bottom: 84px;
    width: 128px;
    height: 10px;
    transform: rotate(-14deg);
    opacity: .78;
    z-index: 2;
  }
  .chopsticks::before,
  .chopsticks::after {
    content: '';
    position: absolute;
    left: 0;
    width: 128px;
    height: 4px;
    border-radius: 99px;
    background: linear-gradient(90deg, #7e4b28, #d6a45f 72%, #8d542d);
    box-shadow: 0 3px 4px rgba(69,35,16,.12), 0 13px 12px -9px rgba(82,43,18,.28);
  }
  .chopsticks::after { top: 7px; transform: translateX(7px); }
  .steam {
    position: absolute;
    right: 15px;
    bottom: 124px;
    width: 82px;
    height: 58px;
    opacity: .34;
    background:
      radial-gradient(ellipse at 24% 70%, transparent 0 36%, rgba(255,255,255,.78) 37% 41%, transparent 42%),
      radial-gradient(ellipse at 52% 55%, transparent 0 36%, rgba(255,255,255,.72) 37% 41%, transparent 42%),
      radial-gradient(ellipse at 77% 72%, transparent 0 36%, rgba(255,255,255,.66) 37% 41%, transparent 42%);
    animation: steamRise 3.8s ease-in-out infinite;
  }
  @keyframes steamRise {
    0%, 100% { transform: translateY(5px); opacity: .20; }
    50% { transform: translateY(-4px); opacity: .38; }
  }

  .word-panel {
    position: absolute;
    left: 50%;
    top: 22px;
    transform: translateX(-50%);
    width: 760px;
    min-height: 178px;
    border-radius: 12px;
    padding: 22px 28px 20px;
    background:
      linear-gradient(180deg, rgba(255,253,245,.98), rgba(255,246,224,.96)),
      repeating-linear-gradient(0deg, rgba(151,92,38,.035) 0 1px, transparent 1px 14px);
    border: 2px solid rgba(172, 69, 41, .28);
    box-shadow: 0 20px 42px rgba(94, 50, 20, .18), inset 0 1px 0 rgba(255,255,255,.90);
    z-index: 4;
  }
  .jp-word {
    min-height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-size: 44px;
    line-height: 1.12;
    font-weight: 900;
    letter-spacing: 0;
    color: #2f2418;
    text-shadow: 0 2px 0 rgba(255,255,255,.80);
    padding: 0 4px;
    overflow-wrap: anywhere;
  }
  .kana-word {
    min-height: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    margin-top: 7px;
    color: #8a6a4d;
    font-size: 19px;
    line-height: 1.15;
    letter-spacing: 0;
    padding: 0 4px;
    overflow-wrap: anywhere;
  }
  .roman-display {
    min-height: 66px;
    margin-top: 13px;
    display: grid;
    align-items: center;
    justify-content: center;
    grid-template-columns: repeat(var(--roman-cols, 28), .62em);
    column-gap: 0;
    row-gap: 3px;
    font-family: Consolas, 'Courier New', monospace;
    font-size: 44px;
    font-weight: 900;
    line-height: 1.08;
    letter-spacing: 0;
    white-space: normal;
    overflow: visible;
    text-rendering: geometricPrecision;
  }
  .roman-display.long {
    align-content: center;
    max-height: 76px;
  }
  .roman-display .char {
    display: inline-flex;
    width: .62em;
    height: 1.08em;
    align-items: center;
    justify-content: center;
    font: inherit;
  }
  .roman-display .typed {
    color: var(--good);
    font-weight: 900;
    text-shadow: 0 1px 0 rgba(255,255,255,.75), 0 0 10px rgba(19,138,99,.12);
  }
  .roman-display .next {
    color: var(--accent);
    font-weight: 900;
    border-bottom: .12em solid var(--accent);
    padding-bottom: 3px;
    text-shadow: 0 1px 0 rgba(255,255,255,.86);
  }
  .roman-display .rest {
    color: rgba(70,49,32,.42);
    font-weight: 900;
  }
  .input-row {
    margin: 16px auto 0;
    width: 86%;
    height: 12px;
    border-radius: 999px;
    background: rgba(89, 58, 34, .14);
    overflow: hidden;
    box-shadow: inset 0 1px 2px rgba(56, 35, 18, .16);
  }
  .input-progress {
    width: 0%;
    height: 100%;
    border-radius: 999px;
    background: linear-gradient(90deg, #0d8a67, #e7b42f, #c7352a);
    box-shadow: 0 0 16px rgba(13,138,103,.18);
  }

  .lane-wrap {
    position: absolute;
    left: 58px;
    right: 58px;
    bottom: 118px;
    height: 196px;
    z-index: 3;
    perspective: 880px;
  }
  .lane-wrap::before {
    content: '';
    position: absolute;
    left: 98px;
    right: 10px;
    top: 139px;
    height: 38px;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(44, 29, 18, .34), rgba(44,29,18,.15) 46%, transparent 72%);
    filter: blur(3px);
    z-index: 0;
    pointer-events: none;
  }
  .lane-wrap::after {
    content: '';
    position: absolute;
    left: 108px;
    right: 0;
    top: 50px;
    height: 118px;
    border-radius: 6px 26px 24px 6px;
    background:
      linear-gradient(180deg, rgba(255,255,255,.98) 0 9px, rgba(190,199,197,.88) 10px 18px, transparent 19px 86px, rgba(55,64,62,.34) 87px 101px, rgba(255,255,255,.58) 102px 100%),
      linear-gradient(180deg, rgba(255,255,255,.60), rgba(82,93,92,.18));
    border: 1px solid rgba(91, 95, 90, .22);
    box-shadow:
      inset 0 10px 0 rgba(255,255,255,.46),
      inset 0 -12px 0 rgba(73, 82, 79, .20),
      0 22px 34px rgba(111, 58, 22, .18);
    transform: rotateX(58deg) skewX(-3deg);
    transform-origin: center bottom;
    clip-path: polygon(0 0, 100% 0, 96% 100%, 0 100%);
    z-index: 1;
    pointer-events: none;
  }
  .drop-gap {
    position: absolute;
    left: 61px;
    top: 132px;
    width: 118px;
    height: 50px;
    border-radius: 50%;
    background:
      radial-gradient(ellipse at 50% 45%, rgba(40,25,16,.26), rgba(40,25,16,.12) 48%, transparent 74%);
    filter: blur(2px);
    z-index: 1;
    pointer-events: none;
  }
  .lane-terminal {
    display: none;
  }
  .lane-terminal::before {
    content: none;
    display: none;
  }
  .lane-terminal::after {
    content: none;
    display: none;
  }
  .belt {
    position: absolute;
    left: 112px;
    right: 2px;
    top: 60px;
    height: 108px;
    border-radius: 4px 28px 26px 4px;
    overflow: hidden;
    border: 1px solid rgba(86, 95, 95, .28);
    background:
      linear-gradient(180deg, #fbfdf9 0 7px, #cfd9d4 8px 15px, #717e7b 16px 22px, #2b3434 23px 73px, #101516 74px 82px, #899692 83px 90px, #e9f0ec 91px 100%),
      linear-gradient(90deg, #e6ebe7, #a2afab);
    box-shadow:
      inset 0 8px 12px rgba(255,255,255,.42),
      inset 0 -12px 14px rgba(25, 30, 30, .30),
      0 19px 28px rgba(106, 55, 22, .18);
    z-index: 2;
    transform: rotateX(58deg) skewX(-3deg);
    transform-origin: center bottom;
    clip-path: polygon(0 0, 100% 0, 96% 100%, 0 100%);
  }
  .belt::before {
    content: '';
    position: absolute;
    left: -70px;
    right: -70px;
    top: 25px;
    height: 52px;
    background:
      repeating-linear-gradient(90deg, rgba(255,255,255,.12) 0 2px, transparent 2px 36px),
      repeating-linear-gradient(90deg, rgba(0,0,0,.18) 0 1px, transparent 1px 18px),
      linear-gradient(180deg, rgba(112,124,120,.58), rgba(23,28,28,.94));
    animation: beltMove 1.55s linear infinite;
  }
  .belt::after {
    content: '';
    position: absolute;
    left: 12px;
    right: 18px;
    top: 12px;
    height: 7px;
    border-radius: 999px;
    background: linear-gradient(90deg, rgba(255,255,255,.76), rgba(157,169,166,.46), rgba(255,255,255,.66));
    box-shadow: 0 73px 0 rgba(245,250,246,.46), 0 65px 0 rgba(47,55,53,.34), 0 1px 0 rgba(255,255,255,.40);
  }
  .front-rail {
    position: absolute;
    left: 108px;
    right: 0;
    top: 142px;
    height: 34px;
    border-radius: 0 0 26px 8px;
    background:
      linear-gradient(180deg, rgba(255,255,255,.70) 0 8px, rgba(190,202,198,.72) 9px 15px, rgba(92,104,101,.50) 16px 23px, rgba(255,255,255,.46) 24px 100%);
    border-bottom: 1px solid rgba(70,78,75,.26);
    box-shadow: 0 14px 20px rgba(84,43,18,.16), inset 0 2px 0 rgba(255,255,255,.46);
    z-index: 4;
    transform: rotateX(50deg) skewX(-3deg);
    transform-origin: center bottom;
    clip-path: polygon(2% 0, 98% 0, 100% 100%, 0 100%);
    pointer-events: none;
  }
  .plate::before {
    content: '';
    position: absolute;
    left: 10px;
    right: 10px;
    bottom: 13px;
    height: 20px;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(22,28,27,.24), rgba(22,28,27,.10) 48%, transparent 72%);
    filter: blur(2.5px);
    transform: rotateX(58deg) scaleX(1.08);
    z-index: 0;
  }
  @keyframes beltMove {
    0% { transform: translateX(0); }

<script>
window.addEventListener('error', function(e) {
  console.error('Error:', e.message, e.filename, e.lineno);
});

function storageGet(key) {
  let value = null;
  try { value = localStorage.getItem(key); } catch(e) {}
  if (value !== null && value !== '') return value;
  try {
    const prefix = encodeURIComponent(key) + '=';
    const parts = document.cookie ? document.cookie.split(';') : [];
    for (let i = 0; i < parts.length; i++) {
      const part = parts[i].trim();
      if (part.indexOf(prefix) === 0) return decodeURIComponent(part.slice(prefix.length));
    }
  } catch(e) {}
  return null;
}
function storageSet(key, value) {
  try { localStorage.setItem(key, value); } catch(e) {}
  try {
    const maxAge = 60 * 60 * 24 * 365 * 5;
    document.cookie = encodeURIComponent(key) + '=' + encodeURIComponent(value) + '; max-age=' + maxAge + '; path=/; SameSite=Lax';
  } catch(e) {}
}

let audioCtx = null;
let bgmEnabled = true;
let sfxEnabled = true;
let bgmTimer = null;
let bgmRunning = false;
const SFX_VOLUME = 1.65;
const BGM_VOLUME = 1.9;

function getAC() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e) { return null; }
  }
  if (audioCtx.state === 'suspended') {
    try { audioCtx.resume(); } catch(e) {}
  }
  return audioCtx;
}

function tone(freq, dur, type, gain, when, detune) {
  const ac = getAC(); if (!ac) return;
  const start = when || ac.currentTime;
  const level = gain || 0.05;
  const attack = Math.min(0.026, Math.max(0.012, dur * 0.24));
  const releaseStart = Math.max(start + attack + 0.01, start + dur - 0.035);
  const osc = ac.createOscillator();
  const g = ac.createGain();
  osc.type = type || 'sine';
  osc.frequency.setValueAtTime(freq, start);
  if (detune) osc.detune.setValueAtTime(detune, start);
  g.gain.setValueAtTime(0.0001, start);
  g.gain.linearRampToValueAtTime(level, start + attack);
  g.gain.setValueAtTime(level, releaseStart);
  g.gain.linearRampToValueAtTime(0.0001, start + dur);
  osc.connect(g);
  g.connect(ac.destination);
  osc.start(start);
  osc.stop(start + dur + 0.06);
}

function playKeySound() {
  if (!sfxEnabled) return;
  const ac = getAC(); if (!ac) return;
  const t = ac.currentTime;
  tone(980, 0.055, 'triangle', 0.020 * SFX_VOLUME, t);
}
function playWrongSound() {
  if (!sfxEnabled) return;
  const ac = getAC(); if (!ac) return;
  const t = ac.currentTime;
  tone(156, 0.13, 'triangle', 0.032 * SFX_VOLUME, t, -12);
  tone(118, 0.15, 'sine', 0.015 * SFX_VOLUME, t + 0.045);
}
function playClearSound(combo) {
  if (!sfxEnabled) return;
  const ac = getAC(); if (!ac) return;
  const t = ac.currentTime;
  const lift = Math.min(combo, 18) * 7;
  tone(659 + lift, 0.07, 'triangle', 0.028 * SFX_VOLUME, t);
  tone(880 + lift, 0.09, 'triangle', 0.030 * SFX_VOLUME, t + 0.055);
  tone(1174 + lift, 0.13, 'sine', 0.024 * SFX_VOLUME, t + 0.13);
}
function playMissSound() {
  if (!sfxEnabled) return;
  const ac = getAC(); if (!ac) return;
  const t = ac.currentTime;
  tone(260, 0.13, 'triangle', 0.034 * SFX_VOLUME, t);
  tone(196, 0.18, 'triangle', 0.029 * SFX_VOLUME, t + 0.09);
  tone(130, 0.22, 'triangle', 0.020 * SFX_VOLUME, t + 0.18);
}

function startBgm() {
  if (!bgmEnabled || bgmRunning) return;
  const ac = getAC(); if (!ac) return;
  bgmRunning = true;
  const melody = [659, 0, 587, 523, 587, 0, 440, 523, 659, 784, 659, 587, 523, 0, 440, 392];
  const bass = [196, 196, 220, 196, 174, 174, 196, 220];
  let step = 0;
  bgmTimer = setInterval(function() {
    if (!bgmEnabled || !bgmRunning) return;
    const t = ac.currentTime + 0.035;
    const note = melody[step % melody.length];
    if (note) {
      tone(note, 0.15, 'triangle', 0.009 * BGM_VOLUME, t);
      if (step % 8 === 7) tone(note * 2, 0.08, 'sine', 0.004 * BGM_VOLUME, t + 0.07);
    }
    if (step % 4 === 0) tone(bass[(step / 4) % bass.length], 0.22, 'sine', 0.010 * BGM_VOLUME, t);
    step += 1;
  }, 185);
}
function stopBgm() {
  bgmRunning = false;
  if (bgmTimer) { clearInterval(bgmTimer); bgmTimer = null; }
}

function combinePrefixes(prefixes, suffixes) {
  const out = [];
  for (let i = 0; i < prefixes.length; i++) {
    for (let j = 0; j < suffixes.length; j++) out.push(prefixes[i] + suffixes[j]);
  }
  return out.slice(0, 180);
}

function firstConsonant(text) {
  if (!text) return '';
  const c = text.charAt(0);
  if ('aeioun'.indexOf(c) >= 0) return '';
  return c;
}

function kanaToCandidates(kana) {
  const memo = {};
  function rec(index) {
    if (index >= kana.length) return [''];
    if (memo[index]) return memo[index];
    const ch = kana.charAt(index);
    if (ch === 'っ') {
      const rest = rec(index + 1);
      const doubled = [];
      for (let i = 0; i < rest.length; i++) {
        const fc = firstConsonant(rest[i]);
        if (fc) doubled.push(fc + rest[i]);
      }
      memo[index] = doubled.length ? doubled.slice(0, 180) : rest;
      return memo[index];
    }
    if (ch === 'ん') {
      const rest = rec(index + 1);
      memo[index] = combinePrefixes(['n','nn','m'], rest);
      return memo[index];
    }
    if (ch === 'ー') {
      const rest = rec(index + 1);
      memo[index] = combinePrefixes(['-'], rest);
      return memo[index];
    }
    const two = kana.slice(index, index + 2);
    if (COMBO_MAP[two]) {
      memo[index] = combinePrefixes(COMBO_MAP[two], rec(index + 2));
      return memo[index];
    }
    const opts = KANA_MAP[ch] || [ch];
    memo[index] = combinePrefixes(opts, rec(index + 1));
    return memo[index];
  }
  const unique = Array.from(new Set(rec(0)));
  const candidateSet = new Set(unique);
  function guideScore(value) {
    let penalty = 0;
    for (let i = 0; i < value.length; i++) {
      if (value.charAt(i) === 'm') {
        const nValue = value.slice(0, i) + 'n' + value.slice(i + 1);
        if (candidateSet.has(nValue)) penalty += 100;
      }
    }
    if (value.indexOf('nn') >= 0) penalty += 6;
    if (/[xl]/.test(value)) penalty += 3;
    return penalty;
  }
  return unique.sort(function(a, b) {
    return guideScore(a) - guideScore(b) || a.length - b.length || a.localeCompare(b);
  });
}

function shuffleArray(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    const tmp = a[i];
    a[i] = a[j];
    a[j] = tmp;
  }
  return a;
}

function getTypeKana(word) {

function classifyWord(word) {
  if (word.kind === 'sentence') return 'sentence';
  const typeKana = getTypeKana(word);
  const sample = kanaToCandidates(typeKana)[0] || typeKana;
  const len = sample.length;
  if (len <= 7) return 'short';
  if (len <= 13) return 'medium';
  return 'long';
}

const WORD_META = WORDS.map(function(word, idx) {

const WORD_BUCKETS = {
  short: WORD_META.filter(function(m) { return m.bucket === 'short'; }).map(function(m) { return m.idx; }),
  medium: WORD_META.filter(function(m) { return m.bucket === 'medium'; }).map(function(m) { return m.idx; }),
  long: WORD_META.filter(function(m) { return m.bucket === 'long'; }).map(function(m) { return m.idx; }),
  sentence: WORD_META.filter(function(m) { return m.bucket === 'sentence'; }).map(function(m) { return m.idx; })
};
let wordDecks = { short: [], medium: [], long: [], sentence: [], all: [] };
let recentIndexes = [];
let lastBucket = '';

function refillDeck(bucket) {
  const base = bucket === 'all'
    ? WORD_META.map(function(m) { return m.idx; })
    : (WORD_BUCKETS[bucket] || []).slice();
  let pool = base.filter(function(idx) { return recentIndexes.indexOf(idx) < 0; });
  if (!pool.length) pool = base.slice();
  wordDecks[bucket] = shuffleArray(pool);
}

function drawFromBucket(bucket) {
  if (!wordDecks[bucket] || !wordDecks[bucket].length) refillDeck(bucket);
  if (!wordDecks[bucket] || !wordDecks[bucket].length) return null;
  return wordDecks[bucket].shift();
}

function randomItem(list) {
  if (!list || !list.length) return null;
  return list[Math.floor(Math.random() * list.length)];
}

function drawFreshIndex(bucket) {
  const base = bucket === 'all'
    ? WORD_META.map(function(m) { return m.idx; })
    : (WORD_BUCKETS[bucket] || []).slice();
  let pool = base.filter(function(idx) {
    return recentIndexes.indexOf(idx) < 0 && usedIndexes.indexOf(idx) < 0;
  });
  if (!pool.length) {
    pool = WORD_META
      .map(function(m) { return m.idx; })
      .filter(function(idx) { return recentIndexes.indexOf(idx) < 0 && usedIndexes.indexOf(idx) < 0; });
  }
  if (!pool.length) {
    pool = base.filter(function(idx) { return recentIndexes.indexOf(idx) < 0; });
  }
  if (!pool.length) {
    pool = WORD_META
      .map(function(m) { return m.idx; })
      .filter(function(idx) { return recentIndexes.indexOf(idx) < 0; });
  }
  if (!pool.length) pool = base.length ? base : WORD_META.map(function(m) { return m.idx; });
  return randomItem(pool);
}

function chooseWeightedBucket() {
  const elapsedRatio = state === 'playing'
    ? Math.min(1, Math.max(0, (Date.now() - startTime) / Math.max(1, (endTime - startTime))))
    : 0;
  let weights;
  if (elapsedRatio < 0.28) {
    weights = { short: 28, medium: 30, long: 24, sentence: 18 };
  } else if (elapsedRatio < 0.68) {
    weights = { short: 22, medium: 30, long: 27, sentence: 21 };
  } else {
    weights = { short: 18, medium: 26, long: 29, sentence: 27 };
  }
  if (lastBucket && weights[lastBucket]) weights[lastBucket] *= 0.45;
  const total = weights.short + weights.medium + weights.long + weights.sentence;
  let r = Math.random() * total;
  const keys = ['short', 'medium', 'long', 'sentence'];
  for (let i = 0; i < keys.length; i++) {
    r -= weights[keys[i]];
    if (r <= 0) return keys[i];
  }
  return 'medium';
}

function chooseWord() {
  const bucket = chooseWeightedBucket();
  lastBucket = bucket;
  let idx = drawFreshIndex(bucket);
  if (idx === null || typeof idx === 'undefined') idx = drawFreshIndex('all');
  if (idx === null || typeof idx === 'undefined') idx = drawFromBucket(bucket);
  if (idx === null || typeof idx === 'undefined') idx = drawFromBucket('all');
  if (idx === null || typeof idx === 'undefined') idx = Math.floor(Math.random() * WORDS.length);
  recentIndexes.push(idx);
  const recentLimit = Math.max(80, Math.min(140, Math.floor(WORDS.length * 0.24)));
  while (recentIndexes.length > recentLimit) recentIndexes.shift();
  usedIndexes.push(idx);
  if (usedIndexes.length > Math.floor(WORDS.length * 0.82)) usedIndexes = usedIndexes.slice(-Math.floor(WORDS.length * 0.28));
  return WORDS[idx];
}

}

const bubbleClasses = ['bubble-training','bubble-kappa','bubble-tamago','bubble-ebi','bubble-akami','bubble-chutoro','bubble-otoro','bubble-combo','bubble-miss'];
function getWordGradeClass(grade) {
  if (grade === '大トロ級') return 'bubble-otoro';
  if (grade === '中トロ級') return 'bubble-chutoro';
  if (grade === '赤身級') return 'bubble-akami';
  if (grade === '海老級') return 'bubble-ebi';
  if (grade === '玉子級') return 'bubble-tamago';
  if (grade === 'かっぱ巻級') return 'bubble-kappa';
  return 'bubble-training';
}
function getResultRankClass(rank) {
  return 'rank-' + String(rank).toLowerCase().replace(/\+/g, 'plus');
}
function showBubble(text, type) {
  bubbleClasses.forEach(function(cls) { bubble.classList.remove(cls); });
  if (!text || !String(text).trim()) {
    bubble.classList.remove('show');
    bubble.textContent = '';
    return;
  }
  if (type) bubble.classList.add(type);
  bubble.textContent = text;
  bubble.classList.remove('show');
  void bubble.offsetWidth;
  bubble.classList.add('show');
}

function flashAtPlate() {
  const shellRect = shell.getBoundingClientRect();
  const plateRect = plate.getBoundingClientRect();
  hitFlash.style.left = (plateRect.left - shellRect.left + plateRect.width / 2) + 'px';
  hitFlash.style.top = (plateRect.top - shellRect.top + plateRect.height / 2) + 'px';
  hitFlash.classList.remove('show');
  void hitFlash.offsetWidth;
  hitFlash.classList.add('show');
}

function shake(type) {
  shell.classList.remove('shake-small', 'shake-big');
  void shell.offsetWidth;
  shell.classList.add(type === 'big' ? 'shake-big' : 'shake-small');
}

function completeWord() {
  if (wordLocked) return;
  wordLocked = true;
  shell.classList.remove('word-danger');
  const elapsed = (performance.now() - wordStart) / 1000;
  const typedLen = viewCandidate().length || currentInput.length;
  const wordKpm = Math.round((typedLen / Math.max(0.12, elapsed)) * 60);
  const remainBonus = Math.max(0, Math.round((wordLimit - elapsed) * 80));
  const lenBonus = typedLen * 12;
  combo += 1;
  maxCombo = Math.max(maxCombo, combo);
  const comboBonus = Math.min(500, combo * 12);
  const gained = lenBonus + remainBonus + comboBonus;
  score += gained;
  clearCount += 1;
  recentClears.unshift(current.jp);
  recentClears = recentClears.slice(0, 12);
  plate.classList.remove('clear');
  void plate.offsetWidth;
  plate.classList.add('clear');
  flashAtPlate();
  playClearSound(combo);
  if (combo > 0 && combo % 5 === 0) {
    showBubble(combo + ' COMBO +' + gained, 'bubble-combo');
  } else {
    const grade = getWordGrade(wordKpm);
    showBubble(grade + ' / ' + wordKpm + ' key/min / +' + gained, getWordGradeClass(grade));
  }
  updateStats();
  setTimeout(function() {
    if (state === 'playing') newWord();
  }, 150);
}

function getWordGrade(wordKpm) {
  if (wordKpm >= 400) return '大トロ級';
  if (wordKpm >= 350) return '中トロ級';
  if (wordKpm >= 310) return '赤身級';
  if (wordKpm >= 270) return '海老級';
  if (wordKpm >= 230) return '玉子級';
  if (wordKpm >= 190) return 'かっぱ巻級';
  return '修行中';
}

function missWord() {
  if (wordLocked) return;
  wordLocked = true;
  shell.classList.remove('word-danger');
  missCount += 1;
  combo = 0;
  currentInput = '';
  plate.classList.remove('miss');
  void plate.offsetWidth;
  plate.classList.add('miss');
  playMissSound();
  shake('big');
  showBubble('MISS / 皿落ち', 'bubble-miss');
  updateStats();
  setTimeout(function() {
    if (state === 'playing') newWord();
  }, 620);
}

function handleKey(e) {
  document.body.focus();
  if (state === 'menu' && (e.key === 'Enter' || e.key === ' ' || e.code === 'Space')) {
    e.preventDefault();
    startCountdown();
    return;
  }
  if (state === 'result' && (e.key === 'Enter' || e.key === ' ' || e.code === 'Space')) {
    e.preventDefault();
    startCountdown();
    return;
  }
  if (state !== 'playing' || wordLocked) return;
  const k = e.key;
  if (k === 'Backspace') {
    e.preventDefault();
    if (currentInput.length) currentInput = currentInput.slice(0, -1);
    renderRoman();
    return;
  }
  if (k.length !== 1) return;
  const ch = k.toLowerCase();
  if (!/^[a-z\-']$/.test(ch)) return;
  e.preventDefault();
  totalKeys += 1;
  const trial = currentInput + ch;
  if (compatibleCandidates(trial).length > 0) {
    currentInput = trial;
    correctKeys += 1;
    playKeySound();
    renderRoman();
    if (candidates.indexOf(currentInput) >= 0) completeWord();
  } else {
    wrongCount += 1;
    combo = 0;
    playWrongSound();
    shake('small');
    updateStats();
  }
}

function gameLoop(now) {
  if (state !== 'playing') return;
  if (!lastFrame) lastFrame = now;
  lastFrame = now;
  const timeLeft = endTime - Date.now();
  if (timeLeft <= 0) {
    finishGame();
    return;
  }
  if (!wordLocked) {
    const progress = Math.min(1, (now - wordStart) / (wordLimit * 1000));
    updatePlatePosition(progress);
    if (progress >= 1) missWord();
  }
  updateStats();
  rafId = requestAnimationFrame(gameLoop);
}

function startCountdown() {
  initAudioOnGesture();
  if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  state = 'countdown';
  wordLocked = true;
  shell.classList.remove('hidden-start');
  shell.classList.remove('word-danger', 'time-low');
  $('startOverlay').classList.add('hidden');
  $('resultOverlay').classList.add('hidden');
  $('countdownOverlay').classList.remove('hidden');
  let count = 3;
  function paintCount(text) {
    const el = $('countdownValue');
    el.textContent = text;
    el.classList.remove('countdown-number');
    void el.offsetWidth;
    el.classList.add('countdown-number');
  }
  paintCount(String(count));
  tone(660, 0.10, 'triangle', 0.024);
  countdownTimer = setInterval(function() {
    count -= 1;
    if (count > 0) {
      paintCount(String(count));
      tone(660 + (3 - count) * 80, 0.10, 'triangle', 0.024);
      return;
    }
    if (count === 0) {
      paintCount('GO');
      tone(1046, 0.18, 'triangle', 0.032);
      return;
    }
    clearInterval(countdownTimer);
    countdownTimer = null;
    $('countdownOverlay').classList.add('hidden');
    beginGame();
  }, 820);
}

function beginGame() {
  initAudioOnGesture();
  shell.classList.remove('hidden-start');
  shell.classList.remove('word-danger', 'time-low');
  $('startOverlay').classList.add('hidden');
  $('resultOverlay').classList.add('hidden');
  $('countdownOverlay').classList.add('hidden');
  state = 'playing';
  score = 0;
  clearCount = 0;
  missCount = 0;
  wrongCount = 0;
  correctKeys = 0;
  totalKeys = 0;
  combo = 0;
  maxCombo = 0;
  recentClears = [];
  usedIndexes = [];
  recentIndexes = [];
  lastBucket = '';
  wordDecks = { short: [], medium: [], long: [], sentence: [], all: [] };
  const now = Date.now();
  startTime = now;
  endTime = now + COURSE.time * 1000;
  lastFrame = 0;
  newWord();
  updateStats();
  if (rafId) cancelAnimationFrame(rafId);
  rafId = requestAnimationFrame(gameLoop);
}

function finishGame() {
  state = 'result';
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  shell.classList.remove('word-danger', 'time-low');
  const attempts = correctKeys + wrongCount;
  const acc = attempts ? (correctKeys / attempts) * 100 : 100;
  const elapsedMin = COURSE.time / 60;
  const speed = correctKeys / Math.max(0.01, elapsedMin);
  if (score > bestScore) {
    bestScore = score;
    storageSet('sushiTypingBest', String(bestScore));
  }
  $('bestValue').textContent = String(bestScore);
  const rank = getRank(score, speed, acc);
  const rankEl = $('rankValue');
  rankEl.textContent = rank.rank;
  rankEl.className = 'rank ' + getResultRankClass(rank.rank);
  $('resultMessage').textContent = rank.msg;
  $('rScore').textContent = String(score);
  $('rClear').textContent = String(clearCount);
  $('rAcc').textContent = formatOne(acc) + '%';
  $('rSpeed').textContent = formatOne(speed);
  $('rCombo').textContent = String(maxCombo);
  $('rMiss').textContent = String(missCount);
  $('rWrong').textContent = String(wrongCount);
  $('rBest').textContent = String(bestScore);
  $('resultOverlay').classList.remove('hidden');
  playResultSound(rank.rank);
}

function getRank(sc, speed, acc) {
  const table = [
    {rank:'SSS', minSpeed:400, minAcc:97, msg:'SSSランク。速さも正確さも板前級です。'},
    {rank:'SS+', minSpeed:385, minAcc:97, msg:'SS+ランク。高速なのに手元がぶれていません。'},
    {rank:'SS', minSpeed:365, minAcc:96, msg:'SSランク。長いお題でもかなり安定しています。'},
    {rank:'S+', minSpeed:345, minAcc:96, msg:'S+ランク。上級者らしい気持ちいい打鍵です。'},
    {rank:'S', minSpeed:320, minAcc:95, msg:'Sランク。320 KEY/MIN・正確性95%をクリアしています。'},
    {rank:'A+', minSpeed:270, minAcc:93, msg:'A+ランク。十分速く、正確さも頼れます。'},
    {rank:'A', minSpeed:220, minAcc:90, msg:'Aランク。実用域をしっかり超えています。'},
    {rank:'B+', minSpeed:190, minAcc:88, msg:'B+ランク。リズムよく入力できています。'},
    {rank:'B', minSpeed:160, minAcc:85, msg:'Bランク。基本の入力は安定しています。'},
    {rank:'C+', minSpeed:130, minAcc:82, msg:'C+ランク。正確さを保つほど伸びます。'},
    {rank:'C', minSpeed:105, minAcc:78, msg:'Cランク。キーの位置に慣れてきています。'},
    {rank:'D', minSpeed:80, minAcc:70, msg:'Dランク。短いお題でテンポを作りましょう。'},
    {rank:'E', minSpeed:50, minAcc:60, msg:'Eランク。まずは一文字ずつ確実に。'},
    {rank:'F', minSpeed:0, minAcc:0, msg:'Fランク。落ち着いて、次の一皿からです。'}
  ];
  for (let i = 0; i < table.length; i++) {
    const r = table[i];
    if (speed >= r.minSpeed && acc >= r.minAcc) {
      return {rank: r.rank, msg: r.msg};
    }
  }
  return {rank:'F', msg:'Fランク。落ち着いて、次の一皿からです。'};
}

function playResultSound(rank) {
  if (!sfxEnabled) return;
  const ac = getAC(); if (!ac) return;
  const t = ac.currentTime;
  let notes;
  if (rank === 'SSS') notes = [523,659,784,1046,1318,1568];
  else if (rank === 'SS+' || rank === 'SS') notes = [523,659,784,988,1174,1568];
  else if (rank === 'S+' || rank === 'S') notes = [523,659,784,1046];
  else if (rank === 'A+' || rank === 'A') notes = [440,554,659,880];
  else notes = [330,392,494,659];
  for (let i = 0; i < notes.length; i++) tone(notes[i], 0.18, 'triangle', 0.028 * SFX_VOLUME, t + i * 0.12);
}

function showMenu() {
  state = 'menu';
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
  shell.classList.add('hidden-start');
  shell.classList.remove('word-danger', 'time-low');
  $('countdownOverlay').classList.add('hidden');
  $('resultOverlay').classList.add('hidden');
  $('startOverlay').classList.remove('hidden');
}

function initAudioOnGesture() {
  if (!bgmEnabled && !sfxEnabled) return;
  const ac = getAC(); if (!ac) return;
  if (ac.state === 'suspended') ac.resume();
  if (bgmEnabled) startBgm();
}

function updateAudioButtons() {
  const bgmText = bgmEnabled ? 'BGM ON' : 'BGM OFF';
  const sfxText = sfxEnabled ? '効果音 ON' : '効果音 OFF';
  ['menuBgmBtn', 'playBgmBtn'].forEach(function(id) { if ($(id)) $(id).textContent = bgmText; });
  ['menuSfxBtn', 'playSfxBtn'].forEach(function(id) { if ($(id)) $(id).textContent = sfxText; });
  ['menuBgmBtn', 'playBgmBtn'].forEach(function(id) { if ($(id)) $(id).classList.toggle('is-off', !bgmEnabled); });
  ['menuSfxBtn', 'playSfxBtn'].forEach(function(id) { if ($(id)) $(id).classList.toggle('is-off', !sfxEnabled); });
  if (!bgmEnabled) stopBgm();
  else if (state === 'playing' || state === 'countdown') startBgm();
}

function toggleBgm() {
  bgmEnabled = !bgmEnabled;
  if (bgmEnabled) initAudioOnGesture();
  updateAudioButtons();
  document.body.focus();
}

function toggleSfx() {
  sfxEnabled = !sfxEnabled;
  if (sfxEnabled) initAudioOnGesture();
  updateAudioButtons();
  document.body.focus();
}

function scaleApp() {
  const root = document.getElementById('app-root');
  if (!root) return;
  const naturalW = 1060;
  const naturalH = 700;
  const viewportW = Math.min(
    window.innerWidth || naturalW,
    document.documentElement.clientWidth || naturalW,
    window.visualViewport ? window.visualViewport.width : naturalW
  );
  const viewportH = Math.min(
    window.innerHeight || naturalH,
    document.documentElement.clientHeight || naturalH,
    window.visualViewport ? window.visualViewport.height : naturalH
  );
  const scale = Math.min(1, viewportW / (naturalW + 16), viewportH / (naturalH + 16));
  root.style.transform = 'scale(' + scale + ')';
}


$('startBtn').addEventListener('click', startCountdown);
$('resetBtn').addEventListener('click', startCountdown);
$('restartBtn').addEventListener('click', startCountdown);
$('backBtn').addEventListener('click', showMenu);
$('menuBgmBtn').addEventListener('click', toggleBgm);
$('menuSfxBtn').addEventListener('click', toggleSfx);
$('playBgmBtn').addEventListener('click', toggleBgm);
$('playSfxBtn').addEventListener('click', toggleSfx);

window.addEventListener('keydown', handleKey);
window.addEventListener('resize', scaleApp);
window.addEventListener('load', scaleApp);
if (window.visualViewport) window.visualViewport.addEventListener('resize', scaleApp);
window.addEventListener('click', function() { document.body.focus(); if (state === 'playing') initAudioOnGesture(); });
document.body.focus();
scaleApp();
requestAnimationFrame(scaleApp);
setTimeout(scaleApp, 120);
renderRoman();
updateAudioButtons();
</script>
</body>
</html>
