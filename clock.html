<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stylish Clock</title>
  <style>
    :root {
      --bg1: #050711;
      --bg2: #111827;
      --glass: rgba(255, 255, 255, 0.08);
      --line: rgba(255, 255, 255, 0.24);
      --text: rgba(255, 255, 255, 0.94);
      --muted: rgba(255, 255, 255, 0.48);
      --glow1: #6ee7ff;
      --glow2: #a78bfa;
      --glow3: #f472b6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 18%, rgba(110, 231, 255, 0.22), transparent 32%),
        radial-gradient(circle at 82% 22%, rgba(167, 139, 250, 0.26), transparent 31%),
        radial-gradient(circle at 52% 92%, rgba(244, 114, 182, 0.20), transparent 36%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
    }

    body::before {
      content: "";
      position: fixed;
      inset: -20%;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 48px 48px;
      transform: rotate(-10deg);
      mask-image: radial-gradient(circle, black 0 38%, transparent 72%);
    }

    .stage {
      position: relative;
      width: min(88vw, 520px);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
    }

    .halo {
      position: absolute;
      inset: 1%;
      border-radius: 50%;
      background: conic-gradient(
        from 180deg,
        var(--glow1),
        var(--glow2),
        var(--glow3),
        var(--glow1)
      );
      filter: blur(32px);
      opacity: 0.58;
      animation: slowGlow 8s ease-in-out infinite alternate;
    }

    .clock {
      position: relative;
      width: 86%;
      aspect-ratio: 1;
      border-radius: 50%;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.16), rgba(255,255,255,0.04)),
        radial-gradient(circle at 50% 42%, rgba(255,255,255,0.14), transparent 38%);
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow:
        0 35px 90px rgba(0,0,0,0.46),
        inset 0 0 0 1px rgba(255,255,255,0.08),
        inset 0 0 95px rgba(110,231,255,0.08);
      backdrop-filter: blur(18px);
      overflow: hidden;
    }

    .clock::before {
      content: "";
      position: absolute;
      inset: 7%;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.14);
      box-shadow: inset 0 0 45px rgba(255,255,255,0.05);
    }

    .clock::after {
      content: "";
      position: absolute;
      inset: 14%;
      border-radius: 50%;
      background:
        radial-gradient(circle, transparent 56%, rgba(255,255,255,0.08) 57%, transparent 59%),
        conic-gradient(from 0deg, transparent 0 6deg, rgba(255,255,255,0.12) 6deg 7deg, transparent 7deg 30deg);
      opacity: 0.7;
    }

    .tick {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 2px;
      height: 14px;
      border-radius: 999px;
      background: var(--line);
      transform: translate(-50%, -50%) rotate(var(--angle)) translateY(-182px);
      transform-origin: center;
      z-index: 2;
    }

    .tick.major {
      height: 24px;
      width: 3px;
      background: rgba(255,255,255,0.48);
      box-shadow: 0 0 16px rgba(255,255,255,0.18);
    }

    .number {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) rotate(var(--angle)) translateY(-145px) rotate(calc(-1 * var(--angle)));
      color: rgba(255,255,255,0.58);
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.04em;
      z-index: 3;
      text-shadow: 0 0 16px rgba(255,255,255,0.12);
    }

    .hand {
      position: absolute;
      left: 50%;
      top: 50%;
      transform-origin: 50% 100%;
      transform: translate(-50%, -100%) rotate(var(--deg));
      border-radius: 999px;
      z-index: 5;
    }

    .hour {
      width: 8px;
      height: 25%;
      background: linear-gradient(to top, rgba(255,255,255,0.34), white);
      box-shadow: 0 0 24px rgba(255,255,255,0.22);
    }

    .minute {
      width: 5px;
      height: 35%;
      background: linear-gradient(to top, rgba(110,231,255,0.35), var(--glow1));
      box-shadow: 0 0 22px rgba(110,231,255,0.38);
    }

    .second {
      width: 2px;
      height: 41%;
      background: linear-gradient(to top, rgba(244,114,182,0.35), var(--glow3));
      box-shadow: 0 0 18px var(--glow3);
    }

    .cap {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 24px;
      height: 24px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      z-index: 6;
      background: white;
      box-shadow:
        0 0 0 8px rgba(255,255,255,0.09),
        0 0 30px rgba(110,231,255,0.82);
    }

    .digital {
      position: absolute;
      left: 50%;
      bottom: 23%;
      transform: translateX(-50%);
      width: 66%;
      padding: 15px 18px 16px;
      border-radius: 24px;
      text-align: center;
      z-index: 7;
      background: rgba(0,0,0,0.20);
      border: 1px solid rgba(255,255,255,0.14);
      box-shadow:
        inset 0 0 25px rgba(255,255,255,0.04),
        0 18px 45px rgba(0,0,0,0.22);
    }

    .time {
      display: block;
      font-size: clamp(31px, 7vw, 52px);
      letter-spacing: 0.08em;
      font-weight: 750;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 0 22px rgba(110,231,255,0.46);
    }

    .date {
      display: block;
      margin-top: 9px;
      font-size: clamp(11px, 2.5vw, 13px);
      letter-spacing: 0.16em;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    @keyframes slowGlow {
      from {
        transform: scale(0.98) rotate(0deg);
        opacity: 0.46;
      }
      to {
        transform: scale(1.04) rotate(12deg);
        opacity: 0.68;
      }
    }

    @media (max-width: 560px) {
      .tick {
        transform: translate(-50%, -50%) rotate(var(--angle)) translateY(-35.2vw);
      }

      .number {
        transform: translate(-50%, -50%) rotate(var(--angle)) translateY(-28vw) rotate(calc(-1 * var(--angle)));
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <main class="stage" aria-label="現在時刻を表示する時計">
    <div class="halo"></div>

    <section class="clock">
      <span class="tick major" style="--angle: 0deg"></span>
      <span class="tick" style="--angle: 30deg"></span>
      <span class="tick" style="--angle: 60deg"></span>
      <span class="tick major" style="--angle: 90deg"></span>
      <span class="tick" style="--angle: 120deg"></span>
      <span class="tick" style="--angle: 150deg"></span>
      <span class="tick major" style="--angle: 180deg"></span>
      <span class="tick" style="--angle: 210deg"></span>
      <span class="tick" style="--angle: 240deg"></span>
      <span class="tick major" style="--angle: 270deg"></span>
      <span class="tick" style="--angle: 300deg"></span>
      <span class="tick" style="--angle: 330deg"></span>

      <span class="number" style="--angle: 0deg">12</span>
      <span class="number" style="--angle: 90deg">3</span>
      <span class="number" style="--angle: 180deg">6</span>
      <span class="number" style="--angle: 270deg">9</span>

      <div class="hand hour" id="hourHand"></div>
      <div class="hand minute" id="minuteHand"></div>
      <div class="hand second" id="secondHand"></div>
      <div class="cap"></div>

      <div class="digital">
        <span class="time" id="timeText">00:00:00</span>
        <span class="date" id="dateText"></span>
      </div>
    </section>
  </main>

  <script>
    const hourHand = document.getElementById("hourHand");
    const minuteHand = document.getElementById("minuteHand");
    const secondHand = document.getElementById("secondHand");
    const timeText = document.getElementById("timeText");
    const dateText = document.getElementById("dateText");

    const pad = (value) => String(value).padStart(2, "0");

    function updateClock() {
      const now = new Date();
      const hours = now.getHours();
      const minutes = now.getMinutes();
      const seconds = now.getSeconds();
      const milliseconds = now.getMilliseconds();

      const secondDegrees = (seconds + milliseconds / 1000) * 6;
      const minuteDegrees = (minutes + seconds / 60) * 6;
      const hourDegrees = ((hours % 12) + minutes / 60) * 30;

      hourHand.style.setProperty("--deg", hourDegrees + "deg");
      minuteHand.style.setProperty("--deg", minuteDegrees + "deg");
      secondHand.style.setProperty("--deg", secondDegrees + "deg");

      timeText.textContent = `${pad(hours)}:${pad(minutes)}:${pad(seconds)}`;

      const weekdays = ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"];
      dateText.textContent = `${now.getFullYear()}.${pad(now.getMonth() + 1)}.${pad(now.getDate())} ${weekdays[now.getDay()]}`;

      requestAnimationFrame(updateClock);
    }

    updateClock();
  </script>
</body>
</html>
